menu_title: '&8🎒 &6Backpacks &7(&fPage 1/2&7)'
open_command:
  - backpacks
  - bps
  - bags
size: 54
register_command: true
command_description: 'Opens the backpack and upgrade shop.'
command_usage: '/backpacks'
command_permission: 'deluxemenus.menu.backpacks'

items:
  # ====================
  # FILLER
  # ====================
  filler:
    material: BLACK_STAINED_GLASS_PANE
    display_name: ' '
    slots:
      - 0-53

  # ====================
  # HEADER SEPARATORS
  # ====================
  sep_header:
    material: ORANGE_STAINED_GLASS_PANE
    display_name: '&6&lBackpacks'
    slots:
      - 0
      - 1
      - 2
      - 3
      - 5
      - 6
      - 7
      - 8

  # ====================
  # INFO PANEL
  # ====================
  info:
    material: NETHER_STAR
    slot: 4
    display_name: '&e&lBackpack System'
    lore:
      - '&6Backpacks &8(21 tiers)'
      - '&8» &fLeather &7· Copper &7· Iron &7· Gold'
      - '&8» &fDiamond &7· Netherite &7· Emerald'
      - '&8» &fAmethyst &7· Quartz &7· Prismarine'
      - '&8» &fEcho &7· Ender &7· Dragon &7· Beacon'
      - '&8» &fAncient &7· Master &7· Supreme'
      - '&8» &fMythic &7· Divine &7· Infinity &7· Ultimate'
      - '&7Each upgrade consumes the previous backpack.'
      - ''
      - '&e➜ Go to page 2 to see the Upgrades'

  # ====================
  # ROW 3 SEPARATOR (centers the last 3 backpacks)
  # ====================
  sep_row3:
    material: GRAY_STAINED_GLASS_PANE
    display_name: ' '
    slots:
      - 27
      - 28
      - 29
      - 33
      - 34
      - 35

  # ====================
  # LEATHER BACKPACK
  # ====================
  leather_backpack:
    material: CARROT_ON_A_STICK
    item_model: probablybackpacks:backpack/normal/leather/base
    model_data_component:
      floats: [100001]
    slot: 9
    display_name: '&e&lLeather Backpack'
    lore:
      - '&7Tier 1 &8· &e27 slots &8· &b1 upgrade &8· &d1 page'
      - ''
      - '&6You need'
      - '&8» &fString &e%checkitem_amount_mat:STRING%&7/&e4'
      - '&8» &fLeather &e%checkitem_amount_mat:LEATHER%&7/&e4'
      - '&8» &fChest &e%checkitem_amount_mat:CHEST%&7/&e1'
      - ''
      - '&aClick to craft'
    left_click_requirement:
      requirements:
        string:
          type: has item
          material: STRING
          amount: 4
          deny_commands:
            - '[message] &cMissing String &8(&e%checkitem_amount_mat:STRING%&8/&e4&8)'
            - '[sound] ENTITY_VILLAGER_NO'
        leather:
          type: has item
          material: LEATHER
          amount: 4
          deny_commands:
            - '[message] &cMissing Leather &8(&e%checkitem_amount_mat:LEATHER%&8/&e4&8)'
            - '[sound] ENTITY_VILLAGER_NO'
        chest:
          type: has item
          material: CHEST
          amount: 1
          deny_commands:
            - '[message] &cMissing a Chest'
            - '[sound] ENTITY_VILLAGER_NO'
      deny_commands:
        - '[sound] ENTITY_VILLAGER_NO'
    left_click_commands:
      - '[console] minecraft:clear %player_name% string 4'
      - '[console] minecraft:clear %player_name% leather 4'
      - '[console] minecraft:clear %player_name% chest 1'
      - '[player] cp give leather_backpack %player_name% 1'
      - '[message] &aYou obtained the &e&lLeather Backpack&a.'
      - '[sound] ENTITY_PLAYER_LEVELUP'
      - '[refresh]'

  # ====================
  # COPPER BACKPACK
  # ====================
  copper_backpack:
    material: CARROT_ON_A_STICK
    item_model: probablybackpacks:backpack/normal/copper/base
    model_data_component:
      floats: [100002]
    slot: 10
    display_name: '&c&lCopper Backpack'
    lore:
      - '&7Tier 2 &8· &e45 slots &8· &b2 upgrades &8· &d1 page'
      - ''
      - '&6You need'
      - '&8» &fCopper Ingot &e%checkitem_amount_mat:COPPER_INGOT%&7/&e8'
      - '&8» &fLeather Backpack &e%checkitem_amount_namecontains:Leather Backpack%&7/&e1'
      - ''
      - '&c⚠ &7Empty the backpack before upgrading'
      - '&7Items inside will be lost when it is replaced.'
      - ''
      - '&aClick to craft'
    left_click_requirement:
      requirements:
        copper:
          type: has item
          material: COPPER_INGOT
          amount: 8
          deny_commands:
            - '[message] &cMissing Copper Ingots &8(&e%checkitem_amount_mat:COPPER_INGOT%&8/&e8&8)'
            - '[sound] ENTITY_VILLAGER_NO'
        leather_backpack:
          type: javascript
          expression: '%checkitem_amount_namecontains:Leather Backpack% >= 1'
          deny_commands:
            - '[message] &cMissing the Leather Backpack'
            - '[sound] ENTITY_VILLAGER_NO'
      deny_commands:
        - '[sound] ENTITY_VILLAGER_NO'
    left_click_commands:
      - '[console] minecraft:clear %player_name% copper_ingot 8'
      - '[console] minecraft:clear %player_name% *[minecraft:custom_data~{PublicBukkitValues:{"curiospaper:curios_custom_id":"leather_backpack"}}] 1'
      - '[player] cp give copper_backpack %player_name% 1'
      - '[message] &aYou obtained the &c&lCopper Backpack&a.'
      - '[sound] ENTITY_PLAYER_LEVELUP'
      - '[refresh]'

